<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Client</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h2>Risk Calculator</h2>

    <label>Age:</label>
    <input type="number" id="age">

    <label>Weight:</label>
    <input type="number" id="weight">

    <label>Feet:</label>
    <input type="number" id="feet">

    <label>Inches:</label>
    <input type="number" id="inches">

    <label>Systolic:</label>
    <select id="systolic">
      <option value="1">Less than 120</option>
      <option value="2">120-129</option>
      <option value="3">130-139</option>
      <option value="4">140-179</option>
      <option value="5">180+</option>
    </select>

    <label>Diastolic:</label>
    <select id="diastolic">
      <option value="1">Less than 80</option>
      <option value="2">80-89</option>
      <option value="3">90-119</option>
      <option value="4">120+</option>
    </select>

    <label>Family Disease:</label>
    <select id="disease">
      <option value="">None</option>
      <option value="diabetes">Diabetes</option>
      <option value="cancer">Cancer</option>
      <option value="alzheimers">Alzheimer's</option>
    </select>

    <button onclick="calculateRisk()">Calculate Risk</button>

    <div id="risk-result"></div>
  </div>

<script>
  function calculateRisk() {
    const age = document.getElementById('age').value;
    const weight = document.getElementById('weight').value;
    const feet = document.getElementById('feet').value;
    const inches= document.getElementById('inches').value;
    const systolic = document.getElementById('systolic').value;
    const diastolic = document.getElementById('diastolic').value;
    const disease = document.getElementById('disease').value;

    const resultBox = document.getElementById('risk-result');

    fetch(`https://health-insurance-risk-calc-s.azurewebsites.net/calculate-risk?age=${age}&weight=${weight}&feet=${feet}&inches=${inches}&systolic=${systolic}&diastolic=${diastolic}&disease=${disease}`)
      .then(response => response.json())
      .then(data => {
        document.getElementById('risk-result').innerText =
          "Risk Score: " + data.totalRisk + " | Risk Level: " + data.riskLevel;

          resultBox.className = "";

          risk = parseInt(data.totalRisk);

          if (risk <= 25) {
            resultBox.classList.add("risk-green");
          } else if (risk <= 50) {
            resultBox.classList.add("risk-yellow");
          } else if (risk <= 75) {
            resultBox.classList.add("risk-orange");
          } else {
            resultBox.classList.add("risk-red");
          }
      });
  }
</script>

</body>
</html>
